name: CI — Build & Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install backend dependencies
        working-directory: ./backend
        run: pnpm install

      - name: Create backend .env
        working-directory: ./backend
        run: |
          echo "DATABASE_URL=postgresql://postgres@localhost:5432/devdna" >> .env
          echo "PORT=8000" >> .env
          echo "NODE_ENV=test" >> .env
          echo "JWT_SECRET=test_secret" >> .env
          echo "GITHUB_CLIENT_ID=test_id" >> .env
          echo "GITHUB_CLIENT_SECRET=test_secret" >> .env
          echo "FRONTEND_URL=http://localhost:3000" >> .env

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: TypeScript check
        working-directory: ./backend
        run: pnpm build

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --ignore-workspace

      - name: Create frontend .env.local
        working-directory: ./frontend
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:8000" >> .env.local
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env.local
          echo "NEXTAUTH_SECRET=test_secret_for_ci_only" >> .env.local
          echo "GITHUB_CLIENT_ID=test_id" >> .env.local
          echo "GITHUB_CLIENT_SECRET=test_secret" >> .env.local

      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: test_secret_for_ci_only
          GITHUB_CLIENT_ID: test_id
          GITHUB_CLIENT_SECRET: test_secret
          NODE_ENV: production
        run: pnpm build
