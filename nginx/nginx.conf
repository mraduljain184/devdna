# How many worker processes to run
# auto = one per CPU core
worker_processes auto;

events {
  # Max connections per worker
  worker_connections 1024;
}

http {
  # Include mime types (so browser knows file types)
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Enable gzip compression
  # This makes responses smaller = faster loading
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Rate limiting zone
  # Limits each IP to 10 requests per second
  # This prevents spam/abuse/DDoS attacks
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  # Upstream servers
  # These are the actual services NGINX forwards to
  upstream backend {
    server backend:8000;
  }

  upstream frontend {
    server frontend:3000;
  }

  server {
    # Listen on port 80 (standard HTTP port)
    listen 80;

    # Your domain (localhost for now, real domain later)
    server_name localhost;

    # Max upload size (for file uploads to S3)
    client_max_body_size 10M;

    # Security headers
    # These protect against common web attacks
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # API routes → go to Node.js backend
    # Any request starting with /api/ goes to backend
    location /api/ {
      # Apply rate limiting
      limit_req zone=api_limit burst=20 nodelay;

      # Forward to backend
      proxy_pass http://backend;

      # These headers tell backend the real client info
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Timeout settings
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # Health check route → backend
    location /health {
      proxy_pass http://backend;
      proxy_set_header Host $host;
    }

    # Everything else → Next.js frontend
    location / {
      proxy_pass http://frontend;

      # Required for Next.js hot reload in development
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}